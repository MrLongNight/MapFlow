name: "CICD-IssueFlow: Job00 PrefixUserIssues"

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  prefix-user-issue:
    name: Normalize queued user issue title
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.label.name == 'Todo-UserISU'

    steps:
      - name: Prefix Todo-UserISU issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              console.log('No issue payload present.');
              return;
            }

            const labels = (issue.labels || [])
              .map((label) => typeof label === 'string' ? label : label.name)
              .filter(Boolean);

            if (!labels.includes('Todo-UserISU')) {
              console.log('Issue is not in the user queue.');
              return;
            }

            const preservedPrefixes = ['MFusr_#', 'MF_#', 'MFsub_#'];
            if (preservedPrefixes.some((prefix) => issue.title.startsWith(prefix))) {
              console.log('Issue title already uses a managed prefix.');
              return;
            }

            let baseTitle = issue.title
              .replace(/^\[(Bug|Feature|Task)\]:\s*/i, '')
              .replace(/\s+/g, ' ')
              .trim();

            if (!baseTitle) {
              baseTitle = 'User-Issue';
            }

            const normalizedTitle = `MFusr_#${issue.number}-${baseTitle}`;

            if (normalizedTitle === issue.title) {
              console.log('Issue title already normalized.');
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              title: normalizedTitle,
            });

            console.log(`Renamed issue #${issue.number} to "${normalizedTitle}".`);
